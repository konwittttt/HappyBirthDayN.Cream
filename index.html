<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday My Love 🎂</title>

<link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Mali',cursive;
background:linear-gradient(to bottom,#ffd6ec,#ffc2e2);
overflow-x:hidden;
color:#ff4da6;
text-align:center;
}

/* เมนู */
nav{
padding:15px;
}
nav button{
background:white;
border:none;
padding:8px 14px;
margin:5px;
border-radius:20px;
cursor:pointer;
font-family:'Mali';
}

/* หน้า */
.section{
display:none;
padding:20px;
}
.active{
display:block;
}

/* กระต่าย */
.rabbit{
position:fixed;
bottom:10px;
left:-100px;
font-size:40px;
animation:rabbitRun 18s linear infinite;
}
@keyframes rabbitRun{
from{left:-100px;}
to{left:110%;}
}

/* ดาว */
.star{
position:fixed;
animation:twinkle 1.5s infinite alternate;
font-size:14px;
}
@keyframes twinkle{
from{opacity:0.2;}
to{opacity:1;}
}

/* กลีบดอกไม้ */
.petal{
position:fixed;
top:-10px;
animation:fall linear infinite;
}
@keyframes fall{
to{transform:translateY(110vh) rotate(360deg);}
}

/* Memories */
.memory{
margin:30px 0;
}
.memory img{
width:100%;
max-width:350px;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

/* สไลด์ */
#slider img{
width:100%;
max-width:350px;
border-radius:20px;
}

/* เกม */
#heartGame{
font-size:45px;
cursor:pointer;
}

/* ของขวัญ */
.gift{
font-size:65px;
cursor:pointer;
}

canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
}

@media(max-width:600px){
h1{font-size:22px;}
}
</style>
</head>
<body>

<canvas id="firework"></canvas>
<div class="rabbit">🐰</div>

<nav>
<button onclick="show('home')">หน้าแรก</button>
<button onclick="show('memories')">ความทรงจำ</button>
<button onclick="show('game')">เกม</button>
<button onclick="show('gift')">ของขวัญ</button>
<button onclick="show('secret')">ข้อความลับ</button>
</nav>

<!-- หน้าแรก -->
<div id="home" class="section active">
<h1>สุขสันต์วันเกิดนะคี 💖</h1>
<p>เธอคือความสุขที่สุดของเรา</p>

<button onclick="playMusic()">🎵 เปิดเพลง</button>

<h3>พิมพ์ชื่อเธอ 💞</h3>
<input id="nameInput" placeholder="พิมพ์ชื่อ">
<button onclick="heartRain()">ตกหัวใจ</button>

<h3>เราคบกันมาแล้ว</h3>
<p id="countDate"></p>

<h3>รูปสไลด์</h3>
<div id="slider">
<img id="slideImg" src="https://via.placeholder.com/350x400?text=Slide+1">
</div>

<button onclick="firework()">🎆 จุดพลุ</button>
</div>

<!-- Memories -->
<div id="memories" class="section">
<h1>20 ความทรงจำของเรา</h1>
<script>
for(let i=1;i<=20;i++){
document.write(`
<div class="memory">
<img src="https://via.placeholder.com/350x400.png?text=Memory+${i}">
<p>รูปที่ ${i} — ทุกครั้งที่มองภาพนี้ เราจะนึกถึงรอยยิ้ม เสียงหัวเราะ และความอบอุ่นที่เธอให้เรา ช่วงเวลาธรรมดาเหล่านี้กลับกลายเป็นความทรงจำที่มีค่าที่สุดในชีวิตเรา</p>
</div>
`);
}
</script>
</div>

<!-- เกม -->
<div id="game" class="section">
<h1>เกมกดหัวใจ 💗</h1>
<p>กดให้ได้ 20 ครั้ง</p>
<div id="heartGame">💖</div>
<p id="score">0</p>
</div>

<!-- ของขวัญ -->
<div id="gift" class="section">
<h1>ของขวัญ 🎁</h1>
<div class="gift" onclick="openGift()">🎁</div>
<p id="giftText"></p>
</div>

<!-- รหัส -->
<div id="secret" class="section">
<h1>ใส่รหัส 💌</h1>
<input type="password" id="codeInput">
<button onclick="checkCode()">เปิด</button>
<p id="secretText"></p>
</div>

<audio id="bgMusic" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

<script>

/* เปลี่ยนหน้า */
function show(id){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

/* เพลง */
function playMusic(){
document.getElementById('bgMusic').play();
}

/* ดาว */
for(let i=0;i<40;i++){
let s=document.createElement('div');
s.className='star';
s.innerHTML='✨';
s.style.top=Math.random()*100+'vh';
s.style.left=Math.random()*100+'vw';
document.body.appendChild(s);
}

/* กลีบดอกไม้ */
for(let i=0;i<30;i++){
let p=document.createElement('div');
p.className='petal';
p.innerHTML='🌸';
p.style.left=Math.random()*100+'vw';
p.style.animationDuration=5+Math.random()*5+'s';
document.body.appendChild(p);
}

/* เกม */
let score=0;
document.getElementById('heartGame').onclick=function(){
score++;
document.getElementById('score').innerText=score;
if(score==20){
alert("เธอชนะแล้ว 💕 เรารักเธอ!");
}
}

/* ของขวัญ */
function openGift(){
document.getElementById('giftText').innerText="ของขวัญของเธอคือ… เราจะอยู่ข้างๆเธอทุกวัน 💖";
}

/* รหัส */
function checkCode(){
let code=document.getElementById('codeInput').value;
if(code==="1103"){
document.getElementById('secretText').innerText="เรารักเธอมากที่สุดในโลก 💌";
}else{
document.getElementById('secretText').innerText="รหัสผิดนะ 😝";
}
}

/* หัวใจตก */
function heartRain(){
let name=document.getElementById('nameInput').value;
for(let i=0;i<30;i++){
let h=document.createElement('div');
h.innerHTML="💖 "+name;
h.style.position="fixed";
h.style.left=Math.random()*100+"vw";
h.style.top="-20px";
h.style.animation="fall 5s linear";
document.body.appendChild(h);
setTimeout(()=>h.remove(),5000);
}
}

/* นับวันครบรอบ (แก้วันที่เองได้) */
let startDate=new Date("2024-03-11");
let today=new Date();
let diff=Math.floor((today-startDate)/(1000*60*60*24));
document.getElementById("countDate").innerText=diff+" วันแล้ว 💞";

/* สไลด์ */
let slides=[
"https://via.placeholder.com/350x400?text=Slide+1",
"https://via.placeholder.com/350x400?text=Slide+2",
"https://via.placeholder.com/350x400?text=Slide+3"
];
let index=0;
setInterval(()=>{
index=(index+1)%slides.length;
document.getElementById("slideImg").src=slides[index];
},3000);

/* พลุ */
let canvas=document.getElementById("firework");
let ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

function firework(){
for(let i=0;i<100;i++){
ctx.fillStyle="hsl("+Math.random()*360+",100%,50%)";
ctx.beginPath();
ctx.arc(Math.random()*canvas.width,Math.random()*canvas.height,3,0,Math.PI*2);
ctx.fill();
}
setTimeout(()=>ctx.clearRect(0,0,canvas.width,canvas.height),1000);
}

</script>
</body>
</html>
