<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Cream 💖</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  background:black;
  color:white;
  font-family:sans-serif;
  text-align:center;
  overflow:hidden;
}
.screen{
  position:absolute;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  padding:20px;
}
input{
  padding:12px;
  font-size:18px;
  border-radius:12px;
  border:none;
  text-align:center;
}
button{
  margin-top:15px;
  padding:10px 25px;
  font-size:16px;
  border:none;
  border-radius:25px;
  background:pink;
  cursor:pointer;
}
#game,#gallery,#letter,#endScreen{display:none}

img{
  max-width:90%;
  max-height:60vh;
  border-radius:20px;
  box-shadow:0 0 30px pink;
  transition:opacity 1s ease-in-out, transform 1s ease-in-out;
}
.fade-out{opacity:0; transform:scale(.97);}
.fade-in{opacity:1; transform:scale(1);}

.text{
  margin-top:15px;
  font-size:18px;
  max-width:600px;
  transition:opacity 1s;
}

#progressBar{
  width:80%;
  height:6px;
  background:#333;
  border-radius:10px;
  margin-top:10px;
}
#progress{
  height:100%;
  width:0;
  background:pink;
  border-radius:10px;
  transition:width .5s;
}

.star{
  position:absolute;
  width:2px;
  height:2px;
  background:white;
  opacity:.8;
}

.heart{
  position:absolute;
  color:pink;
  animation:float 4s linear forwards;
}
@keyframes float{
  from{transform:translateY(0);opacity:1}
  to{transform:translateY(-100vh);opacity:0}
}
</style>
</head>

<body>

<div class="screen" id="lock">
  <h2>ใส่รหัสผ่านเพื่อไปต่อนะไออ้วน ! 💖</h2>
  <input type="password" id="passInput" placeholder="ใส่รหัส">
  <button onclick="checkPassword()">ยืนยัน</button>
  <p id="error" style="color:pink;"></p>
</div>

<div class="screen" id="game">
  <h2>กดหัวใจให้ครบ 10 ดวงเพื่อไปต่อ 💗</h2>
  <div id="heartArea"></div>
  <p id="count">0 / 10</p>
</div>

<div class="screen" id="gallery">
  <img id="photo">
  <div class="text" id="message"></div>
  <div id="progressBar"><div id="progress"></div></div>
</div>

<div class="screen" id="letter">
  <h2>มีอะไรอยากจะบอกอ้วนนะ 💌</h2>
  <p id="letterText"></p>
  <button onclick="showEnd()">อ่านแล้ว</button>
</div>

<div class="screen" id="endScreen">
  <h1>🎂 สุขสันต์วันเกิดนะคะน้องครีม มีความสุขมากมากกกกกกก 💖</h1>
  <p>โดย อู๋ คนที่เป็นแฟนน้องครีมอ่ะ</p>
</div>

<audio id="bgm" src="music.mp3" loop></audio>

<script>
const password="1103";
let current=1;
const total=20;
let autoSlide;
let isAnimating=false;
let heartCount=0;

const messages=[ /* ข้อความเดิมของมึงทั้งหมด */ 
"รูปนี้คือรูปคู่รูปแรกๆของเราเลยย ชอบมากก",
"ตั้งแต่มีน้องครีมเข้ามาในชีวิตเค้าสดใสขึ้นมากก",
"น้องครีมทำให้โลกนี้สดใสขึ้น มากๆเลยนะ",
"ขอบคุณที่น้องครีมเดินเข้ามาในชีวิตเค้า",
"เค้ารักอ้วนของเค้ามากมากเลยยย",
"รักรอยยิ้มของน้องครีมมากกกๆ",
"อยู่ด้วยกันไปนานๆนะอ้วนนน",
"ผ่านอะไรมาด้วยกันเยอะเลยย นี่ยังคบไม่ถึงปีนะเนี่ยย",
"น้องครีมคือกำลังใจของเค้าา",
"ปีนี้ขอให้น้องครีมมีแต่ความสุข",
"เค้าจะอยู่ข้างๆน้องครีมเสมอ",
"ขอบคุณที่อยู่รักเค้า ไม่ไปไหนจากเค้า",
"เค้ารักน้องครีมมากกก ดกี่ครั้งก็ไม่เบื่อเลยค่ะ",
"ขอบคุณเกิดมาให้เค้าได้รู้จัก",
"ขอบคุณที่เป็นเพื่อน เป็นแฟน ที่ดีของเค้า",
"เค้าโชคดีมากจริงๆ",
"อยากสร้างความทรงจำกับน้องครีมไปอีกเยอะๆเลย",
"สัญญาจะดูแลน้องครีม ไม่ปล่อยน้องครีมหลุดมือแน่ๆ",
"รักน้องครีมมากกว่าคำพูดไหนๆ",
"สุขสันต์วันเกิดนะน้องครีม ขอให้เป็นปีที่ดีของหนูนะคะ 🎉"
];

function checkPassword(){
  const input=document.getElementById("passInput").value;
  if(input===password){
    document.getElementById("lock").style.display="none";
    startGame();
  }else{
    document.getElementById("error").innerText="รหัสผิดนะ 😝";
  }
}

function startGame(){
  document.getElementById("game").style.display="flex";
  const area=document.getElementById("heartArea");
  area.innerHTML="";
  heartCount=0;
  document.getElementById("count").innerText="0 / 10";

  for(let i=0;i<10;i++){
    const h=document.createElement("span");
    h.innerHTML="💗";
    h.style.fontSize="40px";
    h.style.cursor="pointer";
    h.style.margin="10px";
    h.onclick=function(){
      this.remove();
      heartCount++;
      document.getElementById("count").innerText=heartCount+" / 10";
      if(heartCount===10) startCountdown();
    }
    area.appendChild(h);
  }
}

function startCountdown(){
  document.getElementById("game").style.display="none";

  const countdown=document.createElement("div");
  countdown.className="screen";
  countdown.style.fontSize="60px";
  countdown.style.fontWeight="bold";
  document.body.appendChild(countdown);

  let num=3;
  countdown.innerText=num;

  const timer=setInterval(()=>{
    num--;
    if(num===0){
      clearInterval(timer);
      countdown.innerText="🎉";

      setTimeout(()=>{
        countdown.remove();
        document.getElementById("bgm").play();
        openGallery();
      },1000);

    }else{
      countdown.innerText=num;
    }
  },1000);
}

function openGallery(){
  document.getElementById("gallery").style.display="flex";
  createStars();
  shootingStar();
  floatingHearts();
  showImage(current);
  autoSlide=setInterval(nextImage,6000);
}

function showImage(index){
  if(isAnimating) return;
  isAnimating=true;

  const img=document.getElementById("photo");
  const message=document.getElementById("message");

  img.classList.add("fade-out");
  message.style.opacity=0;

  const newImg=new Image();
  newImg.src=index+".jpg";
  newImg.onload=function(){
    setTimeout(()=>{
      img.src=newImg.src;
      message.innerText=messages[index-1];
      document.getElementById("progress").style.width=(index/total*100)+"%";
      img.classList.remove("fade-out");
      img.classList.add("fade-in");
      message.style.opacity=1;
      isAnimating=false;
    },800);
  }
}

function nextImage(){
  current++;
  if(current>total){
    clearInterval(autoSlide);
    document.getElementById("gallery").style.display="none";
    document.getElementById("letter").style.display="flex";
    typeLetter();
    return;
  }
  showImage(current);
}

document.getElementById("gallery").addEventListener("click",function(){
  clearInterval(autoSlide);
  nextImage();
  autoSlide=setInterval(nextImage,6000);
});

function typeLetter(){
const text=`ขอบคุณที่น้องครีมคอยอยู่เคียงข้างกันมาตลอด
ปีนี้อาจจะมีเรื่องให้เราเหนื่อยบ้าง เครียดบ้าง
มีหลายๆครั้งที่เราทะเลาะกัน
แต่ใจเค้าไม่เคยรักน้องครีมน้อยลงหรือคิดอยากจะไปจากน้องครีมเลย 
เค้าจะอยู่ตรงนี้แหละ
เค้าชอบที่ที่มีอ้วน ไม่ว่าจะที่ไหนแค่มีอ้วน เค้าก็มีความสุข 💖`;

let i=0;
const target=document.getElementById("letterText");
const interval=setInterval(()=>{
target.innerHTML=text.substring(0,i).replace(/\n/g,"<br>");
i++;
if(i>text.length) clearInterval(interval);
},40);
}

function showEnd(){
  document.getElementById("letter").style.display="none";
  document.getElementById("endScreen").style.display="flex";
  confetti();
}

function createStars(){
  for(let i=0;i<80;i++){
    const s=document.createElement("div");
    s.className="star";
    s.style.top=Math.random()*100+"%";
    s.style.left=Math.random()*100+"%";
    document.body.appendChild(s);
  }
}

function shootingStar(){
  setInterval(()=>{
    const star=document.createElement("div");
    star.style.position="absolute";
    star.style.width="3px";
    star.style.height="3px";
    star.style.background="white";
    star.style.top=Math.random()*50+"%";
    star.style.left="-10px";
    star.style.boxShadow="0 0 10px white";
    star.style.transition="all 1s linear";
    document.body.appendChild(star);
    setTimeout(()=>{
      star.style.left="110%";
      star.style.top=Math.random()*80+"%";
    },50);
    setTimeout(()=>star.remove(),1200);
  },4000);
}

function floatingHearts(){
  setInterval(()=>{
    const heart=document.createElement("div");
    heart.className="heart";
    heart.innerHTML="💖";
    heart.style.left=Math.random()*100+"%";
    heart.style.fontSize=(20+Math.random()*20)+"px";
    document.body.appendChild(heart);
    setTimeout(()=>heart.remove(),4000);
  },600);
}

function confetti(){
  for(let i=0;i<120;i++){
    const c=document.createElement("div");
    c.style.position="absolute";
    c.style.width="6px";
    c.style.height="6px";
    c.style.background="hsl("+Math.random()*360+",100%,50%)";
    c.style.top="-10px";
    c.style.left=Math.random()*100+"%";
    c.style.transition="all 2s linear";
    document.body.appendChild(c);
    setTimeout(()=>{c.style.top="110%";},50);
    setTimeout(()=>c.remove(),2000);
  }
}
</script>

</body>
</html>
