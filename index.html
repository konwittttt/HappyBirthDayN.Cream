<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday My Love</title>

<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Prompt',sans-serif}
body{
background:linear-gradient(135deg,#ff4e88,#ff9eb5);
height:100vh;
overflow:hidden;
color:white;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
}

/* PASSWORD */
#lockScreen{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:20px;
background:linear-gradient(135deg,#ff4e88,#ff9eb5);
z-index:10;
}

input{
padding:12px;
border:none;
border-radius:12px;
font-size:18px;
text-align:center;
}

button{
padding:10px 25px;
border:none;
border-radius:20px;
background:white;
color:#ff4e88;
font-weight:bold;
cursor:pointer;
}

/* GAME */
#game{
display:none;
flex-direction:column;
gap:20px;
}

.heart{
font-size:40px;
cursor:pointer;
transition:.3s;
}

.heart:hover{
transform:scale(1.3);
}

/* COUNTDOWN */
#countdown{
display:none;
font-size:80px;
font-weight:bold;
}

/* SLIDES */
#slides{
display:none;
flex-direction:column;
align-items:center;
gap:20px;
max-width:90%;
}

#slides img{
width:280px;
height:380px;
object-fit:cover;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.message{
font-size:18px;
max-width:320px;
}

.nav{
display:flex;
gap:15px;
}

.hidden{display:none}
</style>
</head>

<body>

<!-- PASSWORD -->
<div id="lockScreen">
<h2>ใส่รหัสวันเกิดเค้า 🎂</h2>
<input type="password" id="pass" placeholder="รหัสคืออะไรนะ">
<button onclick="checkPass()">เข้าเลย 💖</button>
<p id="error"></p>
</div>

<!-- GAME -->
<div id="game">
<h2>กดหัวใจให้ครบ 5 ดวง ❤️</h2>
<div id="hearts"></div>
<p id="gameText"></p>
</div>

<!-- COUNTDOWN -->
<div id="countdown"></div>

<!-- SLIDES -->
<div id="slides">
<img id="slideImg" src="">
<div class="message" id="slideText"></div>
<div class="nav">
<button onclick="prevSlide()">◀</button>
<button onclick="nextSlide()">▶</button>
</div>
</div>

<audio id="bgm" src="song.mp3"></audio>

<script>

const PASSWORD = "1103";
let heartCount = 0;

function checkPass(){
const input = document.getElementById("pass").value;
if(input === PASSWORD){
document.getElementById("lockScreen").style.display="none";
startGame();
}else{
document.getElementById("error").innerText="รหัสผิดนะะ 😝";
}
}

function startGame(){
document.getElementById("game").style.display="flex";
const heartBox=document.getElementById("hearts");

for(let i=0;i<5;i++){
let h=document.createElement("span");
h.innerHTML="❤️";
h.className="heart";
h.onclick=collectHeart;
heartBox.appendChild(h);
}
}

function collectHeart(e){
e.target.style.visibility="hidden";
heartCount++;
if(heartCount===5){
document.getElementById("game").style.display="none";
startCountdown();
}
}

function startCountdown(){
let count=3;
const cd=document.getElementById("countdown");
cd.style.display="block";
cd.innerText=count;

const interval=setInterval(()=>{
count--;
if(count>0){
cd.innerText=count;
}else{
cd.innerText="🎉";
clearInterval(interval);
setTimeout(()=>{
cd.style.display="none";
startSlides();
document.getElementById("bgm").play();
},1000);
}
},1000);
}

/* SLIDE DATA */
const slides=[
{img:"1.jpg",text:"สุขสันต์วันเกิดนะคนเก่งของเค้า 💖"},
{img:"2.jpg",text:"ขอบคุณที่อยู่ข้างกันเสมอ"},
{img:"3.jpg",text:"ปีนี้ขอให้มีแต่รอยยิ้ม"},
{img:"4.jpg",text:"ขอให้เธอมีความสุขที่สุด"},
{img:"5.jpg",text:"อยู่กับเค้าไปนานๆนะ"},
{img:"6.jpg",text:"ทุกช่วงเวลาที่มีเธอมันมีค่ามาก"},
{img:"7.jpg",text:"เธอคือของขวัญที่ดีที่สุด"},
{img:"8.jpg",text:"รักเธอมากกว่าที่พูดได้"},
{img:"9.jpg",text:"ไม่ว่าจะวันไหนก็เลือกเธอ"},
{img:"10.jpg",text:"ขอบคุณที่เข้ามาในชีวิต"},
{img:"11.jpg",text:"เธอทำให้โลกของเค้าสดใส"},
{img:"12.jpg",text:"ขอให้ปีนี้ปังๆ"},
{img:"13.jpg",text:"ขอให้ฝันทุกอย่างเป็นจริง"},
{img:"14.jpg",text:"เธอเก่งมากแล้วนะ"},
{img:"15.jpg",text:"เค้าภูมิใจในตัวเธอเสมอ"},
{img:"16.jpg",text:"ไม่ว่าจะเกิดอะไรขึ้น เค้าจะอยู่ตรงนี้"},
{img:"17.jpg",text:"จับมือกันแบบนี้ไปเรื่อยๆ"},
{img:"18.jpg",text:"เธอคือความโชคดีที่สุดของเค้า"},
{img:"19.jpg",text:"รักเธอมากขึ้นทุกวัน"},
{img:"20.jpg",text:"Happy Birthday My Love 🎂❤️"}
];

let current=0;

function startSlides(){
document.getElementById("slides").style.display="flex";
showSlide();
}

function showSlide(){
document.getElementById("slideImg").src=slides[current].img;
document.getElementById("slideText").innerText=slides[current].text;
}

function nextSlide(){
if(current<slides.length-1){
current++;
showSlide();
}
}

function prevSlide(){
if(current>0){
current--;
showSlide();
}
}

</script>
</body>
</html>
